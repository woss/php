---
driver:
  name: vagrant

provisioner:
  name: policyfile_zero
  product_name: chef
  chef_license: accept-no-persist
  enforce_idempotency: true
  multiple_converge: 2
  deprecations_as_errors: true
  policyfile: Policyfile.rb

verifier:
  name: inspec

platforms:
  - name: almalinux-8
  - name: almalinux-9
  - name: amazonlinux-2023
  - name: centos-stream-9
  - name: debian-12
  - name: fedora-latest
  - name: rockylinux-8
  - name: rockylinux-9
  - name: ubuntu-20.04
  - name: ubuntu-22.04
  - name: ubuntu-24.04

suites:
  - name: resource
    provisioner:
      named_run_list: default
  - name: resource_community
    provisioner:
      named_run_list: community
    excludes:
      - ubuntu-18.04
      - ubuntu-20.04
      - amazonlinux-2023
      - fedora-latest
  - name: resource_peclchannel
    provisioner:
      named_run_list: default
    attributes:
      pecl_method: channel
    verifier:
      inspec_tests:
        - test/integration/resource
